# Jetson Orin preset — TensorRT FP16 engine + GStreamer CSI/RTSP.
# Prereq: build the engine first, e.g.
#   python -m uav_pipeline.scripts.export_tensorrt \
#       --onnx weights/best_yolov26n_qat_int8_static.onnx \
#       --engine weights/best_yolov26n_qat_int8_static.engine --imgsz 640 --fp16

source:
  type: gstreamer
  # Example: RTSP from a gimbal cam. Replace with your pipeline.
  gstreamer: "rtspsrc location=rtsp://192.168.1.10/stream latency=0 ! rtph264depay ! h264parse ! nvv4l2decoder ! nvvidconv ! video/x-raw,BGR ! appsink drop=1"
  fps: 30
  max_frames: 0

detector:
  backend: trt
  device: ""           # TRT uses the primary GPU
  imgsz: 640
  conf: 0.25
  iou: 0.45
  fp16: true
  classes_of_interest: []
  primary:
    trt: weights/best_yolov26n_qat_int8_static.engine
    names_yaml: weights/names.yaml

ocr:
  enabled: false       # TF/Keras is CPU-only on Jetson; enable only if needed
  keras_model: weights/plate_ocr.keras
  plate_config: weights/plate_config.yaml
  crop_mode: vehicle_lower_third
  vehicle_classes_for_lower_third: [car, van, truck, bus]
  every_n_frames: 8
  vote_window: 5

tracker:
  high_conf: 0.4
  low_conf: 0.15
  iou: 0.3
  max_age: 50
  min_hits: 3
  emat: true
  same_class_gate: false
  interpolate_max_gap: 5
  cmc: {enabled: true, method: affine, downscale: 0.5, n_features: 1000,
        match_ratio: 0.75, ransac_thresh: 5.0, min_matches: 20}

follow:
  enabled: true
  default_policy: highest_score_area
  preferred_classes: [car, van, truck, bus, pedestrian]
  target_area_norm: 0.12
  deadzone_px: 12.0
  lost_recovery_frames: 15
  pid:
    yaw:     {kp: 0.08, ki: 0.0, kd: 0.02, out_limit: 60.0}
    pitch:   {kp: 0.06, ki: 0.0, kd: 0.02, out_limit: 60.0}
    forward: {kp: 0.40, ki: 0.0, kd: 0.0, out_limit: 3.0}
    vertical: {kp: 0.0,  ki: 0.0, kd: 0.0, out_limit: 2.0}

controller:
  backend: mock        # switch to mavlink/ros2 once hardware-validated (stubs)
  mavlink: {connection: "udpin:0.0.0.0:14550", system_id: 1}

sinks:
  video:     {enabled: true, path: output/pipeline.mp4, codec: avc1, fps: 30, draw: true}
  telemetry: {enabled: true, path: output/telemetry.jsonl, csv_summary: output/telemetry_summary.csv}
  control_log: {enabled: true, path: output/commands.jsonl}
