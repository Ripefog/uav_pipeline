# Local run — OpenVINO backend (CPU), batch=16 (gom 16 frame / 1 infer), OCR off.
# primary = YOLOX-X (fixed 736x1280 input, IR baked to batch=16) -> preprocess/imgsz phải khớp.
source:
  type: video
  path: ""
  loop: false
  fps: 30

detector:
  backend: openvino
  device: ""
  preprocess: yolox
  batch: 16
  imgsz: [736, 1280]
  conf: 0.25
  iou: 0.45
  fp16: false
  classes_of_interest: []
  primary:
    openvino: weights/best_yoloxx.xml
    names_yaml: weights/names.yaml

ocr:
  enabled: false
  device: gpu         # cpu | gpu (auto CPU-fallback nếu TF không thấy GPU)
  keras_model: weights/plate_ocr.keras
  plate_config: weights/plate_config.yaml
  crop_mode: vehicle_lower_third
  vehicle_classes_for_lower_third: [car, van, truck, bus]
  min_plate_area_px: 200
  every_n_frames: 5
  vote_window: 5
  plate_detector:
    enabled: false
    backend: openvino
    onnx: weights/yolov26n_qat_plate_int8.onnx

tracker:
  high_conf: 0.4
  low_conf: 0.15
  iou: 0.3
  max_age: 50
  min_hits: 3
  emat: true
  same_class_gate: false
  interpolate_max_gap: 5
  cmc: {enabled: true, method: affine, downscale: 0.5, n_features: 1000,
        match_ratio: 0.75, ransac_thresh: 5.0, min_matches: 20}

follow:
  enabled: true
  default_policy: highest_score_area
  preferred_classes: [car, van, truck, bus, pedestrian]
  target_area_norm: 0.12
  deadzone_px: 12.0
  lost_recovery_frames: 15
  pid:
    yaw:     {kp: 0.08, ki: 0.0, kd: 0.02, out_limit: 60.0}
    pitch:   {kp: 0.06, ki: 0.0, kd: 0.02, out_limit: 60.0}
    forward: {kp: 0.40, ki: 0.0, kd: 0.0, out_limit: 3.0}
    vertical: {kp: 0.0,  ki: 0.0, kd: 0.0, out_limit: 2.0}

controller:
  backend: mock

sinks:
  video:     {enabled: true, path: output/pipeline_ovb.mp4, codec: mp4v, fps: 30, draw: true}
  telemetry: {enabled: true, path: output/telemetry_ovb.jsonl, csv_summary: output/telemetry_ovb_summary.csv}
  control_log: {enabled: true, path: output/commands_ovb.jsonl}
