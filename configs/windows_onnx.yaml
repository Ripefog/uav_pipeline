# Windows dev preset — ONNX Runtime on CPU (no OpenVINO/CUDA needed).
# This is the config that runs out-of-the-box on the dev box (ONNX detector on
# CPU; OCR on GPU via `tensorflow` + CUDA 12.x + cuDNN 9 when ocr.device: gpu).
# OCR is ON (plate_detection mode: a dedicated plate-detector ONNX model crops
# the plate, then fast-plate-ocr Keras CCT reads it).
#
# Use:  python -m uav_pipeline.scripts.run_pipeline -c uav_pipeline/configs/windows_onnx.yaml --source <video|image_dir>

source:
  type: video
  path: ""            # set via --source, or hardcode a video/image-dir here
  loop: false
  fps: 30

detector:
  backend: onnx
  device: ""           # "" = CPU; cuda:0 if onnxruntime-gpu + CUDA
  imgsz: 640
  conf: 0.25
  iou: 0.45
  fp16: false
  classes_of_interest: []
  primary:
    onnx: weights/best_yolov26n_qat_int8_static.onnx
    names_yaml: weights/names.yaml

ocr:
  enabled: true
  device: gpu           # gpu default; on native Windows TF>=2.11 auto-runs CPU (no GPU available)
  keras_model: weights/plate_ocr.keras
  plate_config: weights/plate_config.yaml
  crop_mode: plate_detection          # use the dedicated plate detector below
  vehicle_classes_for_lower_third: [car, van, truck, bus]   # only if crop_mode: vehicle_lower_third
  min_plate_area_px: 200
  every_n_frames: 5
  vote_window: 5
  plate_detector:
    enabled: true
    backend: onnx
    onnx: weights/yolov26n_qat_plate_int8.onnx

tracker:
  high_conf: 0.4
  low_conf: 0.15
  iou: 0.3
  max_age: 50
  min_hits: 3
  emat: true
  same_class_gate: false
  interpolate_max_gap: 5
  cmc: {enabled: true, method: affine, downscale: 0.5, n_features: 1000,
        match_ratio: 0.75, ransac_thresh: 5.0, min_matches: 20}

follow:
  enabled: true
  default_policy: highest_score_area
  preferred_classes: [car, van, truck, bus, pedestrian]
  target_area_norm: 0.12
  deadzone_px: 12.0
  lost_recovery_frames: 15
  pid:
    yaw:     {kp: 0.08, ki: 0.0, kd: 0.02, out_limit: 60.0}
    pitch:   {kp: 0.06, ki: 0.0, kd: 0.02, out_limit: 60.0}
    forward: {kp: 0.40, ki: 0.0, kd: 0.0, out_limit: 3.0}
    vertical: {kp: 0.0,  ki: 0.0, kd: 0.0, out_limit: 2.0}

controller:
  backend: mock

sinks:
  video:     {enabled: true, path: output/pipeline_ocr.mp4, codec: mp4v, fps: 30, draw: true}
  telemetry: {enabled: true, path: output/telemetry_ocr.jsonl, csv_summary: output/telemetry_ocr_summary.csv}
  control_log: {enabled: true, path: output/commands_ocr.jsonl}
